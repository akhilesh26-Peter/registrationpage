<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Foooodie!!! | Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/register.css">

</head>

<body>

    <div class="page">

        <!-- ===========================
                BRAND
        ============================ -->

        <header class="brand">

            <div class="logo-box">
                <img src="assets/images/logo.png" alt="Foooodie Logo">
            </div>

            <h1>Foooodie!!!</h1>

        </header>


        <!-- ===========================
                MAIN SECTION
        ============================ -->

        <div class="container-fluid">

            <div class="row align-items-center justify-content-center page-row">

                <!-- LEFT IMAGE -->

                <div class="col-lg-3 left-side">

                    <img src="assets/images/vegetables-left.png" class="left-image" alt="Vegetables">

                </div>


                <!-- REGISTER CARD -->

                <div class="col-lg-6 d-flex justify-content-center">

                    <div class="register-card">

                        <!-- CARD HEADER -->

                        <div class="card-header">

                            <h2>Create Account</h2>

                            <p>
                                Join Foooodie!!! and enjoy your favourite meals delivered to your doorstep.
                            </p>

                        </div>

                        <!-- FORM -->

                        <form id="registerForm" action="RegisterServlet" method="post">

                            <!-- Full Name -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>

                                    <input type="text" id="fullname" name="fullname" class="form-control"
                                        placeholder="Enter your full name" required>

                                </div>

                            </div>


                            <!-- Email -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input type="email" id="email" name="email" class="form-control"
                                        placeholder="Enter your email" required>

                                </div>

                            </div>


                            <!-- Phone Number -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-telephone"></i>
                                    </span>

                                    <input type="tel" id="phone" name="phone" class="form-control"
                                        placeholder="Enter your phone number" required>

                                </div>

                            </div>


                            <!-- Password -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-lock"></i>
                                    </span>

                                    <input type="password" id="password" name="password" class="form-control"
                                        placeholder="Create a password" required>

                                    <span class="input-group-text password-toggle" id="togglePassword"><i class="bi bi-eye"></i></span>

                                </div>

                            </div>


                            <!-- Confirm Password -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-shield-lock"></i>
                                    </span>

                                    <input type="password" id="confirmPassword" name="confirmPassword"
                                        class="form-control" placeholder="Confirm your password" required>

                                    <span class="input-group-text password-toggle" id="toggleConfirmPassword"><i class="bi bi-eye"></i></span>

                                </div>

                            </div>


                            <!-- REGISTER BUTTON -->

                            <div class="d-grid mt-4">

                                <button type="submit" class="btn register-btn">

                                    <i class="bi bi-person-plus-fill"></i>

                                    Create Account

                                </button>

                            </div>


                            <!-- LOGIN LINK -->

                            <div class="text-center mt-3">

                                <span class="login-text">

                                    Already have an account?

                                </span>

                                <a href="login.html" class="login-link">

                                    Login

                                </a>

                            </div>

                        </form>

                    </div>

                </div>


                <!-- RIGHT IMAGE -->

                <div class="col-lg-3 right-side">

                    <img src="assets/images/sushi-right.png" class="right-image" alt="Sushi">

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Validation -->

    <script src="js/validation.js"></script>

</body>

</html>
